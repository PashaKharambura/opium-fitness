    .nav-back svg { width: 16px; height: 16px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
      border-radius: 10px; padding: 12px 22px; font-size: 15px;
      border: 1px solid transparent; cursor: pointer; transition: transform .2s, box-shadow .2s, background .2s;

    .btn-primary { background: var(--cyan); color: #06201E; box-shadow: var(--glow-c); }

    .crumbs span[aria-current] { color: var(--text); }

    .t-name {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900; line-height: .98;
      font-size: clamp(38px, 6vw, 64px); text-transform: uppercase; letter-spacing: -.01em;
      margin-bottom: 16px;
    }
    .t-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }

  var BASE = "https://pashakharambura.github.io/opium-fitness/";

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function getSlug() {
    return new URLSearchParams(location.search).get("slug") || "";
  }

  function setMeta(t) {
    var title = t.name + " — тренер " + t.role + " | Opium Fitness Львів";
    var desc = t.bio + " Тренує в Opium Fitness — тренажерному залі та фітнес-клубі у Львові.";
    var img = BASE + t.photo;
    var url = BASE + "trainer.html?slug=" + t.slug;
    document.title = title;
    function set(sel, attr, val) {
      var el = document.querySelector(sel);
      if (el) el.setAttribute(attr, val);
    }
    set('meta[name="description"]', "content", desc);
    set('link[rel="canonical"]', "href", url);
    set('meta[property="og:title"]', "content", title);
    set('meta[property="og:description"]', "content", desc);
    set('meta[property="og:image"]', "content", img);
    // og:url (додаємо, якщо немає)
    var ogu = document.querySelector('meta[property="og:url"]');
    if (!ogu) { ogu = document.createElement("meta"); ogu.setAttribute("property", "og:url"); document.head.appendChild(ogu); }
    ogu.setAttribute("content", url);
  }

  function injectSchema(t) {
    var url = BASE + "trainer.html?slug=" + t.slug;
    var data = {
      "@context": "https://schema.org",
      "@type": "ProfilePage",
      "mainEntity": {
        "@type": "Person",
        "name": t.name,
        "jobTitle": "Тренер — " + t.role,
        "image": BASE + t.photo,
        "url": url,
        "knowsAbout": t.tags,
        "worksFor": {
          "@type": ["HealthClub", "ExerciseGym"],
          "name": "Opium Fitness",
          "url": BASE,
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "вул. Шевченка, 31А",
            "addressLocality": "Львів",
            "addressCountry": "UA"
          }
        }
      },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Головна", "item": BASE },
          { "@type": "ListItem", "position": 2, "name": "Тренери", "item": BASE + "index.html#trainers" },
          { "@type": "ListItem", "position": 3, "name": t.name, "item": url }
        ]
      }
    };
    var s = document.createElement("script");
    s.type = "application/ld+json";
    s.textContent = JSON.stringify(data);
    document.head.appendChild(s);
  }

  function tagsHtml(tags) {
    return tags.map(function (x) { return '<span class="t-tag">' + esc(x) + "</span>"; }).join("");
  }

  function dirsHtml(tags) {
    return tags.map(function (x) {
      var d = DIR_DESC[x] || "Тренування під твою ціль із тренером Opium Fitness.";
      return '<div class="t-dir"><div class="t-dir-name">' + esc(x) + '</div><div class="t-dir-desc">' + esc(d) + "</div></div>";
    }).join("");
  }

  function othersHtml(slug) {
    var others = TRAINERS.filter(function (x) { return x.slug !== slug; }).slice(0, 8);
    return others.map(function (x) {
      return '<a class="t-mini" href="trainer.html?slug=' + x.slug + '" aria-label="Тренер ' + esc(x.name) + '">' +
        '<img src="' + x.photo + '" alt="' + esc(x.name) + ' — тренер Opium Fitness" width="' + x.w + '" height="' + x.h + '" loading="lazy" />' +
        '<div class="t-mini-name">' + esc(x.name) + '</div>' +
        '<div class="t-mini-role">' + esc(x.role) + "</div></a>";
    }).join("");
  }

  function render() {
    var slug = getSlug();
    var t = TRAINERS.filter(function (x) { return x.slug === slug; })[0];
    var root = document.getElementById("t-root");

    if (!t) {
      root.innerHTML =
        '<div class="container"><div class="t-404">' +
        "<h1>Тренера не знайдено</h1>" +
        "<p>Можливо, посилання застаріло. Подивись усю команду Opium Fitness.</p>" +
        '<a href="index.html#trainers" class="btn btn-primary">До всіх тренерів</a>' +
        "</div></div>";
      return;
    }

    setMeta(t);
    injectSchema(t);

    var bookHref = "index.html?coach=" + encodeURIComponent(t.name) + "&dir=" + encodeURIComponent(t.dir) + "#contact";

    root.innerHTML =
      '<div class="container">' +
        '<nav class="crumbs" aria-label="Хлібні крихти">' +
          '<a href="index.html">Головна</a><span aria-hidden="true">/</span>' +
          '<a href="index.html#trainers">Тренери</a><span aria-hidden="true">/</span>' +
          '<span aria-current="page">' + esc(t.name) + "</span>" +
        "</nav>" +

        '<section class="t-hero">' +
          '<div class="t-photo-wrap">' +
            '<img class="t-photo" src="' + t.photo + '" alt="' + esc(t.name) + " — тренер " + esc(t.role) + ' в Opium Fitness, Львів" width="' + t.w + '" height="' + t.h + '" />' +
          "</div>" +
          "<div>" +
            '<div class="t-label">Тренер Opium Fitness</div>' +
            '<h1 class="t-name">' + esc(t.name) + "</h1>" +
            '<div class="t-tags">' + tagsHtml(t.tags) + "</div>" +
            '<p class="t-bio">' + esc(t.bio) + "</p>" +
            '<p class="t-context">Проводить тренування в Opium Fitness — тренажерному залі та фітнес-клубі у Львові (вул. Шевченка, 31А). Перше заняття — безкоштовне, без передоплати.</p>' +
            '<div class="t-book">' +
              '<div class="t-book-txt"><strong>Перше заняття — безкоштовно</strong><span>Залиш заявку — менеджер підбере зручний час саме з цим тренером.</span></div>' +
              '<a href="' + bookHref + '" class="btn btn-primary">Записатись на тренування</a>' +
            "</div>" +
          "</div>" +
        "</section>" +

        '<section class="t-section" aria-label="Напрями тренувань">' +
          '<h2 class="t-section-h">Напрями <span class="c">тренувань</span></h2>' +
          '<div class="t-dirs">' + dirsHtml(t.tags) + "</div>" +
        "</section>" +

        '<section class="t-others" aria-label="Інші тренери">' +
          '<h2 class="t-section-h">Інші <span class="c">тренери</span></h2>' +
          '<div class="t-others-track">' + othersHtml(t.slug) + "</div>" +
        "</section>" +
      "</div>";
  }

  render();
  window.addEventListener("popstate", render);
</script>
</body>
</html>
